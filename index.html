<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = 'dp-theme-preference';
          var p = localStorage.getItem(k);
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = p === 'dark' || (p !== 'light' && sysDark);
          var root = document.documentElement;
          root.dataset.theme = dark ? 'dark' : 'light';
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Park — Personal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
